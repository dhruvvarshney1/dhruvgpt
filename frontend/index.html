<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A web-based chat interface powered by NVIDIA's hosted LLM inference API.">
    <title>DhruvGPT — LLM Chat Interface</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ── Sidebar ──────────────────────────────────────────────────── -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">DhruvGPT</h1>
            <button id="new-chat-btn" class="btn-new-chat" title="New chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>New chat</span>
            </button>
        </div>
        <nav id="conversation-list" class="conversation-list" aria-label="Conversations">
            <!-- Populated by JS -->
        </nav>
    </aside>

    <!-- ── Mobile sidebar toggle ────────────────────────────────────── -->
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- ── Main chat area ───────────────────────────────────────────── -->
    <main id="chat-main" class="chat-main">
        <div id="messages" class="messages">
            <!-- Empty state shown when no conversation is active -->
            <div id="empty-state" class="empty-state">
                <div class="empty-state-icon">💬</div>
                <h2>Start a conversation</h2>
                <p>Send a message to begin chatting with the AI assistant.</p>
            </div>
        </div>

        <form id="chat-form" class="chat-form">
            <div class="input-wrapper">
                <textarea
                    id="message-input"
                    class="message-input"
                    placeholder="Type a message…"
                    rows="1"
                    aria-label="Message input"
                ></textarea>
                <button id="send-btn" type="submit" class="btn-send" title="Send message" aria-label="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
